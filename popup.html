<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Agent</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --panel: #252525;
      --border: #333;
      --text: #e0e0e0;
      --muted: #888;
      --accent: #0078d4;
      --accent-hover: #106ebe;
      --success: #2ecc71;
      --error: #e74c3c;
      --user-bubble: #005a9e;
      --assistant-bubble: #2a2a2a;
    }

    * { box-sizing: border-box; }

    body {
      width: 380px;
      height: 600px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    /* Header */
    header {
      padding: 10px 14px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .header-left h1 {
      margin: 0;
      font-size: 15px;
      color: #fff;
    }

    .header-right {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 15px;
      padding: 4px 6px;
      border-radius: 4px;
      transition: all 0.2s;
      line-height: 1;
    }
    .icon-btn:hover { color: #fff; background: #333; }

    /* Config alert */
    .config-alert {
      background: #8b451a;
      color: #f8a5a5;
      padding: 8px 12px;
      font-size: 12px;
      display: none;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #a53a3a;
      flex-shrink: 0;
    }
    .config-alert.show { display: flex; }
    .config-alert a { color: #95d5b2; text-decoration: underline; cursor: pointer; }

    /* Chat area */
    .chat-area {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
      gap: 8px;
      text-align: center;
      padding: 40px 20px;
    }
    .chat-empty .icon { font-size: 36px; }
    .chat-empty .hint { font-size: 12px; color: #666; max-width: 280px; }

    /* Message bubbles */
    .msg {
      max-width: 85%;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }
    .msg.system-info { align-self: center; max-width: 100%; }

    .msg .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.5;
      font-size: 13px;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg.user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant .bubble {
      background: var(--assistant-bubble);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg.system-info .bubble {
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      padding: 4px 8px;
    }

    .msg .label {
      font-size: 11px;
      color: var(--muted);
      padding: 0 4px;
    }
    .msg.user .label { text-align: right; }
    .msg.assistant .label { text-align: left; }

    /* Tool steps inside assistant bubble */
    .tool-steps {
      margin-top: 8px;
      border-top: 1px solid #333;
      padding-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .tool-step {
      font-size: 12px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tool-step .icon { flex-shrink: 0; }
    .tool-step .desc { min-width: 0; }
    .tool-step .status { flex-shrink: 0; font-size: 10px; }

    .thinking-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 4px 0;
    }
    .thinking-indicator .dot {
      width: 6px;
      height: 6px;
      background: #666;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .thinking-indicator .dot:nth-child(1) { animation-delay: -0.32s; }
    .thinking-indicator .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* Status bar */
    .status-bar {
      padding: 6px 14px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      min-height: 28px;
    }
    .status-bar .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      border-top-color: var(--accent);
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-bar .text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Input area */
    .input-area {
      display: flex;
      gap: 6px;
      padding: 8px 10px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      align-items: flex-end;
    }

    .input-area textarea {
      flex: 1;
      height: 36px;
      max-height: 72px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 18px;
      color: #fff;
      padding: 8px 14px;
      font-family: inherit;
      font-size: 13px;
      resize: none;
      line-height: 1.4;
      transition: all 0.2s;
    }
    .input-area textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .input-area textarea:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    .input-area .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .input-area .send-btn:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: scale(1.05);
    }
    .input-area .send-btn:disabled {
      background: #555;
      cursor: not-allowed;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header>
      <div class="header-left">
        <h1>🐙 Browser Agent</h1>
      </div>
      <div class="header-right">
        <button id="clearBtn" class="icon-btn" title="清空会话">🗑️</button>
        <button id="settingsBtn" class="icon-btn" title="打开设置">⚙️</button>
      </div>
    </header>

    <!-- Config alert -->
    <div id="configAlert" class="config-alert">
      <span>⚠️ 请先 <a id="configLink">配置 API</a> 后再使用</span>
    </div>

    <!-- Chat -->
    <div id="chatArea" class="chat-area">
      <div class="chat-empty">
        <div class="icon">🐙</div>
        <div>输入指令让我帮你操作浏览器</div>
        <div class="hint">例如：「打开百度搜索天气」<br>「帮我总结这个页面」<br>「在 GitHub 上找到 OpenClaw」</div>
      </div>
    </div>

    <!-- Status bar -->
    <div id="statusBar" class="status-bar">
      <span id="statusSpinner" class="spinner" style="display:none;"></span>
      <span id="statusText" class="text">就绪</span>
      <span id="tabDisplay" style="flex-shrink:0;font-size:10px;color:#666;">...</span>
    </div>

    <!-- Input -->
    <div class="input-area">
      <textarea id="commandInput" placeholder="输入指令..." rows="1" disabled></textarea>
      <button id="sendBtn" class="send-btn" disabled>➤</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
