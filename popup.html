<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Agent</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --panel: #252525;
      --panel-2: #202020;
      --border: #333;
      --text: #e0e0e0;
      --muted: #888;
      --accent: #0078d4;
      --accent-hover: #106ebe;
      --success: #2ecc71;
      --error: #e74c3c;
    }

    body {
      width: 360px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      border-radius: 8px;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    header {
      padding: 12px 16px;
      background: #252525;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    h1 {
      margin: 0;
      font-size: 16px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .settings-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .settings-btn:hover { color: #fff; background: #333; }
    .settings-btn:active { transform: scale(0.95); }

    main {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    .config-alert {
      background: #8b451a;
      color: #f8a5a5;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      display: none;
      align-items: center;
      gap: 8px;
      border: 1px solid #a53a3a;
    }
    .config-alert.show { display: flex; }
    .config-alert a { color: #95d5b2; text-decoration: underline; cursor: pointer; }

    .status-msg {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      background: #2a2a2a;
      border-left: 3px solid #666;
      word-break: break-word;
      display: none;
      line-height: 1.5;
    }
    .status-msg.show { display: block; }
    .status-msg.success { background: #1b4332; color: #95d5b2; border-color: var(--success); }
    .status-msg.error { background: #5c1a1a; color: #f8a5a5; border-color: var(--error); }
    .status-msg.info { background: #1a3c5c; color: #a5d8f8; border-color: #3498db; }

    .task-timeline {
      display: none;
      height: 220px;
      min-height: 220px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      flex-direction: column;
      gap: 8px;
      box-sizing: border-box;
    }
    .task-timeline.show { display: flex; }
    .task-timeline-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
      font-size: 12px;
      color: var(--muted);
    }
    .task-timeline-title {
      color: #f2f2f2;
      font-weight: 600;
    }
    .task-timeline-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 2px;
    }
    .task-step {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #2a2a2a;
      border: 1px solid #363636;
      transition: all 0.2s;
    }
    .task-step:hover {
      background: #2e2e2e;
      border-color: #444;
    }
    .task-step.active { border-left: 3px solid var(--accent); }
    .task-step.completed { border-left: 3px solid #666; opacity: 0.86; }
    .task-step .icon {
      width: 16px;
      flex-shrink: 0;
      text-align: center;
      margin-top: 1px;
    }
    .task-step .content {
      flex: 1;
      min-width: 0;
    }
    .task-step .title {
      color: #f4f4f4;
      font-size: 13px;
      line-height: 1.4;
      word-break: break-word;
      font-weight: 500;
    }
    .task-step .meta {
      margin-top: 4px;
      color: #999;
      font-size: 11px;
    }

    .composer-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-area {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    textarea {
      width: 100%;
      height: 104px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      color: #fff;
      padding: 10px;
      font-family: inherit;
      font-size: 13px;
      resize: none;
      box-sizing: border-box;
      line-height: 1.5;
      transition: all 0.2s;
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.15);
    }
    textarea:disabled { background: #333; color: #666; cursor: not-allowed; }

    button.primary {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    button.primary:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0, 120, 212, 0.3);
    }
    button.primary:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 2px 6px rgba(0, 120, 212, 0.2);
    }
    button.primary:disabled {
      background: #555;
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
      box-shadow: none;
    }

    button.primary.running {
      background: #005a9e;
      cursor: wait;
      animation: pulse-bg 2s infinite;
    }
    @keyframes pulse-bg {
      0% { background: #005a9e; }
      50% { background: #004a80; }
      100% { background: #005a9e; }
    }

    footer {
      padding: 8px 12px;
      background: #252525;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      flex-shrink: 0;
    }

    kbd { background: #444; padding: 2px 4px; border-radius: 3px; font-family: monospace; }

    .loading-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1><span>🐙</span> Browser Agent</h1>
      <div style="display:flex; gap:4px;">
        <button id="resetBtn" class="settings-btn" title="重置任务状态" style="font-size:12px; padding:2px 6px;">🔄</button>
        <button id="settingsBtn" class="settings-btn" title="打开设置">⚙️</button>
      </div>
    </header>

    <main>
      <div id="configAlert" class="config-alert">
        <span>⚠️ 请先 <a id="configLink">配置 API</a> 后再使用</span>
      </div>

      <div id="statusMsg" class="status-msg"></div>

      <div id="taskTimeline" class="task-timeline">
        <div class="task-timeline-header">
          <span class="task-timeline-title">任务编排</span>
          <span>最新在上</span>
        </div>
        <div id="taskSteps" class="task-timeline-list"></div>
      </div>

      <div class="composer-panel">
        <div class="input-area">
          <textarea id="commandInput" placeholder="输入指令，例如：\n- 打开 GitHub\n- 帮我总结这篇文章\n- 在百度搜索 OpenClaw"></textarea>
          <button id="runBtn" class="primary">
            <span id="btnSpinner" class="loading-spinner" style="display:none;"></span>
            <span id="btnText">🚀 执行指令</span>
          </button>
        </div>
      </div>
    </main>

    <footer>
      <span id="tabTitle">...</span>
      <span><kbd>Ctrl+Shift+Y</kbd></span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
